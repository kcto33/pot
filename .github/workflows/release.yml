name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Read release version from tag
        id: release_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v(?<version>\d+\.\d+\.\d+)$')
          {
            throw "Release tags must use the v<major>.<minor>.<patch> format, for example v1.0.3."
          }

          "app_version=$($Matches.version)" >> $env:GITHUB_OUTPUT

      - name: Build package
        shell: pwsh
        run: .\scripts\Publish-OneFile.ps1 -Version "${{ steps.release_version.outputs.app_version }}" -VersionSuffix $env:GITHUB_REF_NAME -NoZip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"))
          {
            throw "ISCC.exe was not found after installing Inno Setup."
          }

      - name: Build installer
        shell: pwsh
        run: .\scripts\Build-Installer.ps1 -Version "${{ steps.release_version.outputs.app_version }}" -InnoSetupCompiler "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path .\artifacts\installers -Filter "*-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer)
          {
            throw "No setup installer was produced."
          }

          "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME "${{ steps.installer.outputs.installer_path }}" `
            --title "transtools $env:GITHUB_REF_NAME" `
            --notes "Automated release for $env:GITHUB_REF_NAME."
